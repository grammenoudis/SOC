services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-soc}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-soc_password_2026}
      POSTGRES_DB: ${POSTGRES_DB:-soc}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-soc}"]
      interval: 3s
      timeout: 3s
      retries: 10

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    restart: unless-stopped
    ports:
      - "3001:3001"
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-soc}:${POSTGRES_PASSWORD:-soc_password_2026}@db:5432/${POSTGRES_DB:-soc}
      BETTER_AUTH_SECRET: ${BETTER_AUTH_SECRET:-soc-platform-secret-key-change-in-production-2026}
      BETTER_AUTH_URL: http://api:3001
      PORT: "3001"
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-5.1}
      ABUSEIPDB_API_KEY: ${ABUSEIPDB_API_KEY:-}
    depends_on:
      db:
        condition: service_healthy

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:3001}
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:3001}
    depends_on:
      - api

  logger:
    build:
      context: .
      dockerfile: apps/logger/Dockerfile
    restart: unless-stopped
    ports:
      - "514:514/udp"
    environment:
      API_URL: http://api:3001
      # Set LOGGER_WORKSPACE_ID to a workspace ID from the web UI to enable ingestion.
      # Leave empty to run in listen-only mode (prints received syslogs, no forwarding).
      LOGGER_WORKSPACE_ID: ${LOGGER_WORKSPACE_ID:-ws-testing-facility-001}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      LOGGER_LLM_MODEL: ${LOGGER_LLM_MODEL:-gpt-4.1-mini}
      LOGGER_BATCH_SIZE: ${LOGGER_BATCH_SIZE:-10}
      LOGGER_FLUSH_INTERVAL: ${LOGGER_FLUSH_INTERVAL:-30}
      LOGGER_MAX_PENDING: ${LOGGER_MAX_PENDING:-5}
    depends_on:
      - api

volumes:
  pgdata:
